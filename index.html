<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #typing-animation::after {
            content: "|";
            animation: blink-caret 0.75s infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes backspace {
            from { width: 100%; }
            to { width: 0; }
        }

        audio {
            margin-top: 20px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .overlay-text {
            text-align: center;
            font-size: 24px;
        }

        .hidden {
            display: none;
        }

        .label-container {
            display: none;
            margin-top: 10px;
        }

        .label-container a {
            font-size: 16px;
            text-decoration: none;
            color: #fff;
            margin: 0 5px;
        }

        .label-container span {
            font-size: 16px;
            color: #fff;
        }

        .show {
            display: flex;
        }

        html {
          height: 100%;
        }

        body {
          height: 100%;
          margin: 0;
          overflow: hidden;
          background: linear-gradient(to bottom, #202020, #111119);
        }

        .rain {
          position: absolute;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 2;
        }

        .rain.back-row {
          display: none;
          z-index: 1;
          bottom: 60px;
          opacity: 0.5;
        }

        body.back-row-toggle .rain.back-row {
          display: block;
        }

        .drop {
          position: absolute;
          bottom: 100%;
          width: 15px;
          height: 120px;
          pointer-events: none;
          animation: drop 0.5s linear infinite;
        }

        @keyframes drop {
          0% {
            transform: translateY(0vh);
          }
          75% {
            transform: translateY(90vh);
          }
          100% {
            transform: translateY(90vh);
          }
        }

        .stem {
          width: 1px;
          height: 60%;
          margin-left: 7px;
          background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.25));
          animation: stem 0.5s linear infinite;
        }

        @keyframes stem {
          0% {
            opacity: 1;
          }
          65% {
            opacity: 1;
          }
          75% {
            opacity: 0;
          }
          100% {
            opacity: 0;
          }
        }

        .splat {
          width: 15px;
          height: 10px;
          border-top: 2px dotted rgba(255, 255, 255, 0.5);
          border-radius: 50%;
          opacity: 1;
          transform: scale(0);
          animation: splat 0.5s linear infinite;
          display: none;
        }

        body.splat-toggle .splat {
          display: block;
        }

        @keyframes splat {
          0% {
            opacity: 1;
            transform: scale(0);
          }
          80% {
            opacity: 1;
            transform: scale(0);
          }
          90% {
            opacity: 0.5;
            transform: scale(1);
          }
          100% {
            opacity: 0;
            transform: scale(1.5);
          }
        }

        .toggles {
          position: absolute;
          top: 0;
          left: 0;
          z-index: 3;
        }

        .toggle {
          position: absolute;
          left: 20px;
          width: 50px;
          height: 50px;
          line-height: 51px;
          box-sizing: border-box;
          text-align: center;
          font-family: sans-serif;
          font-size: 10px;
          font-weight: bold;
          background-color: rgba(255, 255, 255, 0.2);
          color: rgba(0, 0, 0, 0.5);
          border-radius: 50%;
          cursor: pointer;
          transition: background-color 0.3s;
        }

        .toggle:hover {
          background-color: rgba(255, 255, 255, 0.25);
        }

        .toggle:active {
          background-color: rgba(255, 255, 255, 0.3);
        }

        .toggle.active {
          background-color: rgba(255, 255, 255, 0.4);
        }

        .splat-toggle {
          top: 20px;
        }

        .back-row-toggle {
          top: 90px;
          line-height: 12px;
          padding-top: 14px;
        }

        .single-toggle {
          top: 160px;
        }

        body.single-toggle .drop {
          display: none;
        }

        body.single-toggle .drop:nth-child(10) {
          display: block;
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay">
        <div class="overlay-text">
            <h2>click anywhere to enter</h2>
        </div>
    </div>

    <h1 id="typing-animation" class="hidden"></h1>

    <audio id="background-music" loop>
        <source src="music.mp3" type="audio/mpeg">
        your browser does not support the audio element.
    </audio>

    <div class="label-container" id="label-container">
        <!--<a href="">hello</a>
        <span>|</span>
        -->
        <a href="">test</a>
    </div>

        <script>
        var typedText = "GhosT";
        var isTyping = false;

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById("typing-animation").textContent += text.charAt(i);
                i++;
                setTimeout(function() { typeWriter(text, i); }, 100);
            } else {
                setTimeout(function() { backspaceText(text); }, 3000);
            }
        }

        function backspaceText(text) {
            var typedElement = document.getElementById("typing-animation");
            var typedText = typedElement.textContent;

            if (typedText.length > 0) {
                typedElement.textContent = typedText.substring(0, typedText.length - 1);
                setTimeout(function() { backspaceText(text); }, 100);
            } else {
                setTimeout(function() { typeWriter(text, 0); }, 1000);
            }
        }

        function playBackgroundMusic() {
            var backgroundMusic = document.getElementById("background-music");
            backgroundMusic.play();
            backgroundMusic.volume = 0.05; // Volume

            // Remove the event listener to prevent the music from playing again
            document.removeEventListener("click", playBackgroundMusic);

            // Show the label container
            var labelContainer = document.getElementById("label-container");
            labelContainer.classList.add("show");
        }

        document.addEventListener("click", function() {
            if (!isTyping) {
                var overlay = document.getElementById("overlay");
                overlay.style.display = "none";
                playBackgroundMusic();
                document.getElementById("typing-animation").classList.remove("hidden");
                typeWriter(typedText, 0);
                isTyping = true;
            }
        });
    </script>

    <div class="rain front"></div>
    <div class="rain front-row"></div>
    <div class="rain back-row"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        var makeItRain = function() {
          //clear out everything
          $('.rain').empty();

          var increment = 0;
          var drops = "";
          var backDrops = "";

          while (increment < 100) {
            //couple random numbers to use for various randomizations
            //random number between 98 and 1
            var randoHundo = (Math.floor(Math.random() * (98 - 1 + 1) + 1));
            //random number between 5 and 2
            var randoFiver = (Math.floor(Math.random() * (5 - 2 + 1) + 2));
            //increment
            increment += randoFiver;
            //add in a new raindrop with various randomizations to certain CSS properties
            drops += '<div class="drop" style="left: ' + increment + '%; bottom: ' + (randoFiver + randoFiver - 1 + 100) + '%; animation-delay: 0.' + randoHundo + 's; animation-duration: 0.5' + randoHundo + 's;"><div class="stem" style="animation-delay: 0.' + randoHundo + 's; animation-duration: 0.5' + randoHundo + 's;"></div><div class="splat" style="animation-delay: 0.' + randoHundo + 's; animation-duration: 0.5' + randoHundo + 's;"></div></div>';
            backDrops += '<div class="drop" style="right: ' + increment + '%; bottom: ' + (randoFiver + randoFiver - 1 + 100) + '%; animation-delay: 0.' + randoHundo + 's; animation-duration: 0.5' + randoHundo + 's;"><div class="stem" style="animation-delay: 0.' + randoHundo + 's; animation-duration: 0.5' + randoHundo + 's;"></div><div class="splat" style="animation-delay: 0.' + randoHundo + 's; animation-duration: 0.5' + randoHundo + 's;"></div></div>';
          }

          $('.rain.front-row').append(drops);
          $('.rain.back-row').append(backDrops);
        }

        makeItRain();
    </script>
</body>
</html>
