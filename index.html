<!DOCTYPE html>
<html>
<head>
    <!-- stupid ass fucking title -->
    <title>Bio Website</title>
    <link rel="stylesheet" type="text/css" href="glitch.css">
</head>

<!-- pogress ba r -->
<div class="progress-container">
    <div class="progress-bar">
        <div class="progress"></div>
    </div>
</div>

<script>
    hideOverlay();

    document.addEventListener("DOMContentLoaded", function () {
    const video = document.getElementById("intro-video");
    const progressBar = document.querySelector(".progress");

    // Fetch the video file and track the download progress
    fetch("https://github.com/zfi2/zfi2.github.io/raw/main/intro.mp4")
        .then(response => {
            const contentLength = Number(response.headers.get("Content-Length"));
            let receivedLength = 0;

            const reader = response.body.getReader();

            return new ReadableStream({
                async start(controller) {
                    while (true) {
                        const { done, value } = await reader.read();

                        if (done) {
                            break;
                        }

                        receivedLength += value.length;
                        const progress = (receivedLength / contentLength) * 100;
                        progressBar.style.width = progress + "%";
                        controller.enqueue(value);
                    }

                    controller.close();
                }
            });
        })
        .then(stream => {
            return new Response(stream, { headers: { "Content-Type": "video/mp4" } });
        })
        .then(response => response.blob())
        .then(blob => {
            const videoURL = URL.createObjectURL(blob);
            video.src = videoURL;
            video.style.display = "block"; // Show the video
            progressBar.style.display = "none"; // Hide the progress bar
            showOverlay();
            video.play(); // Start playing the video
        })
        .catch(error => {
            console.error("Error loading the video:", error);
        });
});
</script>

<!-- Initialize the "click anywhere to enter" overlay -->
<div class="overlay" id="overlay">
    <video id="intro-video" style="width: 110%; height: auto;">
        <source src="intro.mp4" type="video/mp4">
        your browser does not support the video element.
    </video>
    <div class="overlay-text">
        <h1 class="glitch" data-text="click anywhere to enter">click anywhere to enter</h1>
    </div>
</div>


<!-- Make the typing animation hidden at first, because the overlay is still here -->
<h1 id="typing-animation" class="hidden"></h1>

<!-- Initialize the background music -->
<audio id="background-music" loop>
    <source src="music.mp3" type="audio/mpeg">
    your browser does not support the audio element.
</audio>

<script>
    var typedText = "GhosT";
    var isTyping = false;

    /*
    Script for the typing animation
    */
    function typeWriter(text, i) {
        if (i < text.length) {
            document.getElementById("typing-animation").textContent += text.charAt(i);
            i++;
            setTimeout(function() { typeWriter(text, i); }, 100);
        } else {
            setTimeout(function() { backspaceText(text); }, 3000);
        }
    }

    /*
    Script for gradually removing the face during the typing animation
    */
    function backspaceText(text) {
        var typedElement = document.getElementById("typing-animation");
        var typedText = typedElement.textContent;

        if (typedText.length > 0) {
            typedElement.textContent = typedText.substring(0, typedText.length - 1);
            setTimeout(function() { backspaceText(text); }, 100);
        } else {
            setTimeout(function() { typeWriter(text, 0); }, 1000);
        }
    }

    // Hide the "click anywhere to exit" overlay
    function showOverlay() {
    var overlay = document.getElementById("overlay");
    var video = document.getElementById("intro-video");
    overlay.classList.add("fade-in");
    //  var video = document.getElementById("intro-video");
    video.pause();
    video.currentTime = 0;
    }

    // Hide the "click anywhere to exit" overlay
    function hideOverlay() {
        var overlay = document.getElementById("overlay");
        var video = document.getElementById("intro-video");
        overlay.classList.add("fade-out");
    //  var video = document.getElementById("intro-video");
        video.pause();
        video.currentTime = 0;
    }

    // Script for playing the background music
    function playBackgroundMusic() {
        var backgroundMusic = document.getElementById("background-music");
        backgroundMusic.play();
        backgroundMusic.volume = 0.1;

        document.removeEventListener("click", playBackgroundMusic);
    }

    /*
    Hide the overlay and play the background music upon clicking
    anywhere on the page, also start the typing animation
    */
    document.addEventListener("click", function() {
        if (!isTyping) {
            hideOverlay();
            playBackgroundMusic();
            document.getElementById("typing-animation").classList.remove("hidden");
            typeWriter(typedText, 0);
            isTyping = true;
        }
    });
</script>
</body>
</html>
